<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔮 尋找你的靈魂神隊友！命定水晶測驗</title>
    <style>
        /* 基礎設定與星空背景 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh; /* 使用 dvh 解決手機瀏覽器工具列高度問題 */
            overflow: hidden; /* 鎖定背景不讓整個網頁滑動 */
            font-family: 'PingFang TC', 'Heiti TC', '微軟正黑體', sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            color: #e0e6ed;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 簡單的 CSS 星星特效 */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 4s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* 主容器 - 玻璃擬物風格 (Glassmorphism) */
        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 600px;
            max-height: 92dvh; /* 限制最高高度，確保不超出螢幕 */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            /* 使用 clamp 讓 padding 在手機與電腦端自動縮放 */
            padding: clamp(15px, 3vh, 40px) clamp(15px, 4vw, 30px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(138, 43, 226, 0.2);
            text-align: center;
            overflow-y: auto; /* 如果結果頁內容真的太多，只允許在此玻璃面板內滑動 */
        }

        /* 隱藏/美化玻璃面板的捲軸 */
        .container::-webkit-scrollbar { width: 6px; }
        .container::-webkit-scrollbar-track { background: transparent; }
        .container::-webkit-scrollbar-thumb { background: rgba(138, 43, 226, 0.5); border-radius: 10px; }

        /* 動態字體與間距縮放 */
        h1 {
            color: #d4af37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            font-size: clamp(1.3rem, 5vw, 2rem);
            margin-top: 0;
            margin-bottom: clamp(10px, 2vh, 20px);
        }
        h2 {
            color: #d4af37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            font-size: clamp(1.1rem, 4.5vw, 1.5rem);
            margin-top: 0;
            margin-bottom: clamp(10px, 2vh, 20px);
        }
        p {
            line-height: 1.5;
            font-size: clamp(0.85rem, 3.5vw, 1.1rem);
            color: #c9d1d9;
            margin-bottom: clamp(10px, 2vh, 16px);
        }

        /* 按鈕樣式 */
        .btn {
            background: linear-gradient(45deg, #4b0082, #8a2be2);
            color: white; border: none;
            padding: clamp(12px, 2vh, 15px) clamp(20px, 5vw, 30px);
            font-size: clamp(1rem, 4vw, 1.2rem);
            border-radius: 30px; cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: clamp(10px, 2vh, 20px);
            font-weight: bold; letter-spacing: 2px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(138, 43, 226, 0.6); }

        /* 測驗選項樣式 */
        .options {
            display: flex;
            flex-direction: column;
            gap: clamp(8px, 1.5vh, 15px); /* 自動調整選項間距 */
            margin-top: clamp(10px, 2vh, 20px);
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: clamp(10px, 1.8vh, 15px) clamp(12px, 3vw, 20px); /* 手機端自動壓縮按鈕厚度 */
            border-radius: 12px;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            line-height: 1.4;
        }

        .option-btn:hover {
            background: rgba(138, 43, 226, 0.4); border-color: #8a2be2;
            transform: translateX(5px);
        }

        /* 進度條 */
        .progress {
            font-size: clamp(0.75rem, 3vw, 0.9rem);
            color: #8892b0;
            margin-bottom: clamp(10px, 2vh, 20px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 結果卡片 */
        .result-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            padding: clamp(15px, 3vh, 25px);
            margin-bottom: clamp(10px, 2vh, 20px);
            text-align: left;
        }
        
        .result-card h3 {
            margin-top: 0; color: #b19cd9;
            border-bottom: 1px solid rgba(177, 156, 217, 0.3);
            padding-bottom: 10px;
            font-size: clamp(1.1rem, 4vw, 1.4rem);
        }

        .result-badge {
            display: inline-block; background: #d4af37; color: #000;
            padding: 3px 10px; border-radius: 20px;
            font-size: clamp(0.75rem, 3vw, 0.8rem);
            font-weight: bold; margin-bottom: 10px;
        }

        /* 頁面切換控制 (改為 Flex 以支援垂直置中對齊) */
        .screen { 
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .screen.active { 
            display: flex; 
            animation: fadeIn 0.6s ease;
        }
        .screen p, .screen h2, .screen .options { width: 100%; } /* 確保內部寬度延展 */

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container" id="main-container">
        
        <!-- 1. 測驗簡介 -->
        <div id="intro-screen" class="screen active">
            <h1>🔮 尋找靈魂神隊友</h1>
            <p>每天在生活、工作、人際關係裡奔波，你是不是覺得需要一點正面能量的加持？</p>
            <p>這份測驗將帶你模擬 5 個場景，測出你當下最缺乏或最契合的能量，找出最適合你的水晶守護星！</p>
            <button class="btn" onclick="startQuiz()">開始測驗 ✨</button>
        </div>

        <!-- 2. 測驗問題區 -->
        <div id="quiz-screen" class="screen">
            <div class="progress" id="progress-text">Question 1 / 5</div>
            <h2 id="question-text">題目</h2>
            <div class="options" id="options-container">
                <!-- 選項會透過 JS 動態產生 -->
            </div>
        </div>

        <!-- 3. 結果顯示區 -->
        <div id="result-screen" class="screen">
            <h1>✨ 你的命定水晶 ✨</h1>
            <p style="margin-bottom: clamp(15px, 3vh, 30px);">根據星象與能量的指引，最適合你的守護星是...</p>
            <div id="results-container" style="width: 100%;">
                <!-- 結果會透過 JS 動態產生 -->
            </div>
            <button class="btn" onclick="restartQuiz()">🔄 再測一次</button>
        </div>

    </div>

    <script>
        // 題庫資料
        const questions = [
            {
                question: "剛踏入一間裝潢超有質感的咖啡廳，你會優先選擇哪種座位？",
                options: [
                    { type: 'A', text: "光線充足、桌子寬敞的「高效率專注區」" },
                    { type: 'B', text: "角落有沙發、光線微弱的「文青沉思區」" },
                    { type: 'C', text: "充滿粉嫩色調、花草環繞的「好人緣打卡區」" },
                    { type: 'D', text: "靠近櫃檯，方便看清店內動向的「核心視野區」" },
                    { type: 'E', text: "靠窗能看到街景的「自由流浪區」" }
                ]
            },
            {
                question: "星期五晚上下班或下課後，你最渴望的舒壓方式是？",
                options: [
                    { type: 'A', text: "把房間徹底打掃一遍，重新找回掌控感" },
                    { type: 'B', text: "獨自戴上耳機聽音樂、冥想，激發靈感" },
                    { type: 'C', text: "約好久不見的朋友吃大餐，好好療癒自己" },
                    { type: 'D', text: "看理財影片、規劃副業，跟朋友聊商機" },
                    { type: 'E', text: "去聽 Live House，或在社群大聊自己的想法" }
                ]
            },
            {
                question: "如果你要開一間屬於自己的小店，你希望是怎樣的店？",
                options: [
                    { type: 'A', text: "極簡風共享辦公室，提供最高效率的工作環境" },
                    { type: 'B', text: "身心靈占卜複合書店，提供心靈與智慧寄託" },
                    { type: 'C', text: "浪漫的花藝甜點店，讓人感受滿滿幸福與愛" },
                    { type: 'D', text: "獲利潛力高，能快速展店的潮流選品店" },
                    { type: 'E', text: "舉辦各類講座、脫口秀交流觀點的沙龍咖啡館" }
                ]
            },
            {
                question: "當遇到卡關或壓力山大的突發狀況時，你的第一直覺是？",
                options: [
                    { type: 'A', text: "冷靜深呼吸，列成待辦清單，按部就班解決" },
                    { type: 'B', text: "暫時抽離現場，相信直覺尋找創意解法" },
                    { type: 'C', text: "找另一半或閨蜜訴苦，需要先被理解和安慰" },
                    { type: 'D', text: "迅速評估得失，管他三七二十一先拼一把" },
                    { type: 'E', text: "據理力爭！把邏輯講清楚去說服對方" }
                ]
            },
            {
                question: "出發去期待已久的旅行，行李箱裡絕對不能少放什麼？",
                options: [
                    { type: 'A', text: "收納整齊的萬用充電線，確保行程在掌控中" },
                    { type: 'B', text: "探討哲學或充滿創意的小說，留給安靜的自己" },
                    { type: 'C', text: "精心搭配的戰袍與香水，隨時準備結交新朋友" },
                    { type: 'D', text: "備用現金與信用卡，保障一路上消費暢行無阻" },
                    { type: 'E', text: "相機或日記本，隨時準備記錄並與世界分享" }
                ]
            }
        ];

        // 水晶結果資料
        const crystalData = {
            'A': { 
                name: "🤍 白水晶 (White Crystal)", 
                title: "思緒清晰的效率達人", 
                traits: "你追求純粹與平衡，做事有條不紊。特別適合需要提升效率、淨化磁場或管理者。",
                effects: "水晶之王。具淨化、專注、平衡、防小人、思緒清晰之效，能放大其他水晶效果。"
            },
            'B': { 
                name: "💜 紫水晶 (Amethyst)", 
                title: "內斂深度的智慧文青", 
                traits: "內心世界豐富，喜歡思考。適合學生、需要冷靜思考、增長智慧與創意、或壓力大需靜心者。",
                effects: "智慧之石。啟發靈感、提升直覺力、平靜心靈。有助穩定理性、遇貴人與化解小人。"
            },
            'C': { 
                name: "🩷 粉水晶 (Rose Quartz)", 
                title: "精緻感性的療癒天使", 
                traits: "重視情感交流與溫柔。適合想增進感情、追求好人緣、廣結善緣或追求身心療癒者。",
                effects: "愛情之石。主愛情運，招桃花、促進浪漫。具舒緩壓力、增進人際關係與內在平靜之效。"
            },
            'D': { 
                name: "💛 黃水晶 (Citrine)", 
                title: "極具野心的斜槓實踐家", 
                traits: "自帶敏銳度，渴望成功。適合創業者、業務、斜槓兼職者，需要提升行動力與自信者。",
                effects: "商人之石。招財事業運（主偏財），鎮定心情、提升工作效率與執行力。"
            },
            'E': { 
                name: "🩵 海藍寶 (Aquamarine)", 
                title: "勇於發聲的自由創作者", 
                traits: "渴望表達、熱愛自由。適合需加強溝通能力、經常表達的行業以及旅行者。",
                effects: "增強自信與勇氣、提升說服力與理性思緒。安撫情緒、帶來內心平靜，亦為旅途守護石。"
            }
        };

        let currentQuestion = 0;
        let scores = { A: 0, B: 0, C: 0, D: 0, E: 0 };

        function switchScreen(hideId, showId) {
            document.getElementById(hideId).classList.remove('active');
            setTimeout(() => {
                document.getElementById(showId).classList.add('active');
                // 重設面板捲軸位置
                document.getElementById('main-container').scrollTop = 0;
            }, 100);
        }

        function startQuiz() {
            currentQuestion = 0;
            scores = { A: 0, B: 0, C: 0, D: 0, E: 0 };
            renderQuestion();
            switchScreen('intro-screen', 'quiz-screen');
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('progress-text').innerText = `Question ${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt.type);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(type) {
            scores[type]++;
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        function calculateResult() {
            let maxScore = 0;
            let topTypes = [];
            
            for (let type in scores) {
                if (scores[type] > maxScore) {
                    maxScore = scores[type];
                    topTypes = [type];
                } else if (scores[type] === maxScore) {
                    topTypes.push(type);
                }
            }

            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '';

            if (topTypes.length > 1) {
                const multiNote = document.createElement('p');
                multiNote.innerHTML = "🌟 <strong>你的能量非常多元！以下都很適合你：</strong>";
                multiNote.style.color = "#d4af37";
                resultsContainer.appendChild(multiNote);
            }

            topTypes.forEach(type => {
                const data = crystalData[type];
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="result-badge">${data.title}</div>
                    <h3>${data.name}</h3>
                    <p style="font-size:0.9rem; margin-bottom:8px;"><strong>🔮 適合對象：</strong><br>${data.traits}</p>
                    <p style="font-size:0.9rem; margin-bottom:0;"><strong>✨ 功效：</strong><br>${data.effects}</p>
                `;
                resultsContainer.appendChild(card);
            });

            switchScreen('quiz-screen', 'result-screen');
        }

        function restartQuiz() {
            switchScreen('result-screen', 'intro-screen');
        }
    </script>
</body>
</html>
